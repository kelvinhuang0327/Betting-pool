name: replay-default-validation

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  replay-default-validation:
    name: replay-default-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Install Playwright browser tooling
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run replay default validation
        run: |
          python scripts/run_replay_default_validation.py --report-dir outputs/replay

      - name: Upload replay validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-default-validation-report
          path: outputs/replay/
